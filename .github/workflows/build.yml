name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS 26 Apple Silicon
    runs-on: macos-26

    env:
      GHOSTTY_REF: ${{ vars.GHOSTTY_REF || 'main' }}
      ZIG_VERSION: "0.15.2"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out Ghostty
        uses: actions/checkout@v4
        with:
          repository: ghostty-org/ghostty
          ref: ${{ env.GHOSTTY_REF }}
          path: ThirdParty/ghostty

      - name: Show toolchain
        run: |
          if [ "$(uname -m)" != "arm64" ]; then
            echo "::error::Expected an Apple Silicon runner, got $(uname -m)."
            exit 1
          fi
          xcodebuild -version
          swift --version
          zig_platform="aarch64-macos"
          echo "ZIG_PLATFORM=$zig_platform" >> "$GITHUB_ENV"

      - name: Install build dependencies
        run: |
          set -euo pipefail

          brew install gettext

          zig_archive="zig-${ZIG_PLATFORM}-${ZIG_VERSION}.tar.xz"
          zig_url="https://ziglang.org/download/${ZIG_VERSION}/${zig_archive}"
          curl -fsSL --retry 3 --retry-delay 5 "$zig_url" -o "$RUNNER_TEMP/$zig_archive"
          tar -xf "$RUNNER_TEMP/$zig_archive" -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/zig-${ZIG_PLATFORM}-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Build GhosttyKit
        run: |
          set -euo pipefail

          cd ThirdParty/ghostty
          echo "Building GhosttyKit from $(git rev-parse --short HEAD)..."
          zig build --summary all -Doptimize=ReleaseFast -Demit-xcframework=true -Dsentry=false

          cd "$GITHUB_WORKSPACE"
          rm -rf Frameworks
          mkdir -p Frameworks
          cp -R ThirdParty/ghostty/macos/GhosttyKit.xcframework Frameworks/

          ghostty_archive="Frameworks/GhosttyKit.xcframework/macos-arm64_x86_64/libghostty.a"
          has_ghostty_public_api() {
            nm -g "$1" 2>/dev/null | grep -Eq '(^|[[:space:]])_?ghostty_app_new$'
          }

          ghostty_public_archive=""
          while IFS= read -r candidate; do
            if has_ghostty_public_api "$candidate"; then
              ghostty_public_archive="$candidate"
              break
            fi
          done < <(
            find ThirdParty/ghostty/.zig-cache ThirdParty/ghostty/zig-out ThirdParty/ghostty/macos Frameworks \
              -type f \( -name 'libghostty.a' -o -name '*.a' \) 2>/dev/null
          )

          if [ -n "$ghostty_public_archive" ]; then
            echo "Using Ghostty public API archive: $ghostty_public_archive"
            cp "$ghostty_public_archive" "$ghostty_archive"
          fi

          if [ ! -f "$ghostty_archive" ]; then
            echo "::error::GhosttyKit build did not produce $ghostty_archive"
            find Frameworks -maxdepth 4 -print
            exit 1
          fi
          if ! has_ghostty_public_api "$ghostty_archive"; then
            echo "::error::$ghostty_archive does not export Ghostty public API symbols."
            echo "Available Ghostty archives:"
            find ThirdParty/ghostty/.zig-cache ThirdParty/ghostty/zig-out ThirdParty/ghostty/macos Frameworks \
              -type f \( -name 'libghostty.a' -o -name '*.a' \) -print 2>/dev/null
            exit 1
          fi

          ghostty_sha="$(shasum -a 256 "$ghostty_archive" | awk '{print $1}')"
          {
            echo "# Swift-only backport metadata. Parsed as fixed KEY=VALUE data; do not source."
            echo "OMNIWM_GHOSTTY_ARCHIVE_RELATIVE_PATH=$ghostty_archive"
            echo "OMNIWM_GHOSTTY_ARCHIVE_SHA256=$ghostty_sha"
          } > Scripts/build-metadata.env

      - name: Verify GhosttyKit
        run: ./Scripts/ghostty-preflight.sh verify

      - name: Build
        run: |
          library_dir="$(./Scripts/ghostty-preflight.sh print-library-dir)"
          LIBRARY_PATH="$library_dir${LIBRARY_PATH:+:$LIBRARY_PATH}" swift build

      - name: Test
        run: |
          library_dir="$(./Scripts/ghostty-preflight.sh print-library-dir)"
          LIBRARY_PATH="$library_dir${LIBRARY_PATH:+:$LIBRARY_PATH}" swift test

      - name: Package unsigned app
        run: ./Scripts/package-app.sh release false

      - name: Archive app bundle
        run: ditto -c -k --keepParent dist/OmniWM.app dist/OmniWM.app.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniWM-unsigned
          path: dist/OmniWM.app.zip
          if-no-files-found: error
